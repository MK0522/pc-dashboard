<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">

	<title>PC Monitor</title>

	<link rel="icon" href="/static/favicon.ico">
	<link rel="stylesheet" href="/static/style.css">
</head>

<body>
	<div class="container">

		<div class="top-info">
			<div class="os-info">
				<span id="os-name"></span>
				<span id="os-version"></span>
			</div>

			<div class="title-row">
				<h1>System Monitor</h1>

				<div id="uptime" class="uptime">
					Up 0m
				</div>
			</div>
		</div>

		<!-- CPU 카드 -->
		<div class="card">

			<div class="card-header">
				<h2>CPU</h2>

				<div class="usage">
					<span id="cpu">0</span>%
				</div>
			</div>

			<div class="sub-info">
				<span id="cpu-name">Loading...</span>
			</div>

			<div class="sub-info">
				<span id="cpu-cores"></span>
				/
				<span id="cpu-threads"></span>
			</div>

			<div class="bar">
				<div id="cpu-bar" class="fill"></div>
			</div>
			<button id="toggle-core-button">
				Show Per-Core Usage
			</button>

			<div id="cpu-grid" class="cpu-grid hidden"></div>
		</div>

		<!-- RAM 카드 -->
		<div class="card">

			<div class="card-header">
				<h2>RAM</h2>

				<div class="usage">
					<span id="ram">0</span>%
				</div>
			</div>

			<div class="sub-info">
				<span id="ram-used">0 GB</span>
				/
				<span id="ram-total">0 GB</span>
			</div>

			<div class="bar">
				<div id="ram-bar" class="fill"></div>
			</div>

		</div>

		<div class="card">
			<h2>Storage</h2>

			<div id="disk-container"></div>
		</div>

		<div class="card">
			<h2>Network</h2>

			<div id="network-container"></div>
		</div>

	</div>

	<!-- 연결 상태 알림 -->
	<div id="connection-status" class="connection-status hidden">
		<span id="connection-message">연결 끊김</span>
	</div>

	<script src="/static/app.js"></script>
</body>
</html>
